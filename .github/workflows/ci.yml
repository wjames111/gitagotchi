# gitagotchi CI — the pet is a pure function of recorded API data, so the
# whole suite runs offline from generated fixtures (plan.md §9.1). The
# macOS leg exists because bash portability is a named risk (§12): macOS
# ships bash 3.2 and gh-pet hops to brew bash ≥ 4.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install bash 4+ and jq (macOS ships bash 3.2)
        if: runner.os == 'macOS'
        run: brew install bash jq
      - name: run the offline suite
        run: gh-pet/tests/run.sh
      # temporary diagnostics: the suite fails on the runners but passes
      # locally under every env we can simulate — dump the actual frames
      - name: debug on failure
        if: failure()
        run: |
          echo "── env"; date -u; jq --version; bash --version | head -1
          locale -a 2>/dev/null | grep -i 'en_US' || echo "no en_US locale"
          cd gh-pet/tests && ./make_fixtures.sh fixtures >/dev/null && cd ..
          export XDG_CACHE_HOME=$(mktemp -d) LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
          echo "── cozy well-fed"; ./gh-pet --fixtures tests/fixtures --snapshot --cozy
          echo "── cozy starving"; ./gh-pet --fixtures tests/fixtures-starving --snapshot --cozy
          echo "── derived state (starving)"
          find "$XDG_CACHE_HOME" -name state.env -path '*starving*' -exec cat {} + 2>/dev/null
          find "$XDG_CACHE_HOME" -name state.env -exec cat {} + | sort -u
          echo "── dense"; ./gh-pet --fixtures tests/fixtures --snapshot
