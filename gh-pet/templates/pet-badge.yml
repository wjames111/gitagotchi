# gitagotchi badge — keeps pet.svg in your profile README current.
#
# SETUP (two one-time steps):
#   1. Drop this file into your profile repo (<login>/<login>) at
#      .github/workflows/pet-badge.yml, and embed the pet in the README:
#
#          ![my gitagotchi](pet.svg)
#
#   2. This workflow commits pet.svg back to your repo, which needs a
#      read-WRITE Actions token. New repos default to read-only, so the
#      push step 403s until you flip it — do ONE of:
#        · GitHub UI: Settings → Actions → General → Workflow permissions
#          → "Read and write permissions" → Save
#        · gh CLI: gh api -X PUT \
#            repos/OWNER/OWNER/actions/permissions/workflow \
#            -f default_workflow_permissions=write
#      (the `permissions: contents: write` below alone isn't enough when the
#       repo default is read-only — the repo setting is the ceiling).
#
# Why cron AND push: there is no cross-repo "this user did something"
# trigger, and the pet changes even when GitHub doesn't — hunger decays,
# sleep and hibernation are functions of the wall clock. The cron is the
# heartbeat; the push trigger gives instant feedback on this repo; the
# commit-if-changed guard keeps no-op runs invisible (the badge SVG is
# deterministic for a given pet state, so "changed" means the pet changed).

name: pet badge
on:
  schedule:
    - cron: "23 * * * *"   # hourly — the wall-clock heartbeat (public repos
                           # run Actions free; the guard skips no-op commits)
  push:
    branches: [main]
  workflow_dispatch:

# serialize runs: an hourly cron firing while a push-triggered run is mid-commit
# would otherwise race the push and fail non-fast-forward. Queue, don't cancel,
# so a pending badge update is never dropped.
concurrency:
  group: pet-badge
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest already ships bash 5, jq and curl — the whole runtime.
      # Clone gitagotchi and run it in place (no install step needed).
      - name: render the pet
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 https://github.com/wjames111/gitagotchi ~/gitagotchi
          ~/gitagotchi/gh-pet/gh-pet "${{ github.repository_owner }}" badge > pet.svg

      - name: commit if the pet changed
        run: |
          git add pet.svg
          if ! git diff --cached --quiet; then
            git config user.name "gitagotchi"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "pet: state changed"
            git pull --rebase --autostash origin main || true
            git push
          fi
